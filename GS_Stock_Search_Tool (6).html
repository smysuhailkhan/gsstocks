<html lang="en">
<head>
<meta charset="UTF-8">

<title>GS Stock Status – Item Finder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f4f8;
    color: #1a2332;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a2332 0%, #2c3e55 100%);
    color: #fff;
    padding: 18px 28px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
    flex-wrap: wrap;
  }
  header .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: .5px;
    color: #f9c84a;
  }
  header .subtitle {
    font-size: 13px;
    color: #b0bec5;
    margin-top: 2px;
  }
  header .report-meta {
    margin-left: auto;
    text-align: right;
    font-size: 12px;
    color: #90a4ae;
    line-height: 1.6;
  }

  .search-wrap {
    background: #fff;
    padding: 16px 28px;
    border-bottom: 1px solid #dde3ec;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
    flex-wrap: wrap;
  }
  .search-icon {
    color: #8899aa;
    font-size: 18px;
    flex-shrink: 0;
  }
  #searchInput {
    flex: 1;
    min-width: 200px;
    border: 2px solid #c8d3df;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
    color: #1a2332;
    background: #f8fafc;
  }
  #searchInput:focus { border-color: #f9c84a; background: #fff; }
  #searchInput::placeholder { color: #aab4c0; }

  .brand-tabs {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .brand-tab {
    border: 2px solid #c8d3df;
    background: #f8fafc;
    border-radius: 7px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: #5a6a7a;
    transition: all .15s;
  }
  .brand-tab.active {
    background: #1a2332;
    border-color: #1a2332;
    color: #f9c84a;
  }
  .brand-tab:hover:not(.active) { background: #e8edf3; }

  .clear-btn {
    background: #e8edf3;
    border: none;
    border-radius: 6px;
    padding: 9px 14px;
    font-size: 13px;
    cursor: pointer;
    color: #5a6a7a;
    transition: background .15s;
    flex-shrink: 0;
  }
  .clear-btn:hover { background: #d0d9e4; }

  .result-count {
    font-size: 13px;
    color: #7a8fa0;
    white-space: nowrap;
    flex-shrink: 0;
    width: 100%;
  }
  .result-count strong { color: #1a2332; }

  .table-wrap {
    overflow-x: auto;
    padding: 20px 28px 40px;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,.08);
    overflow: hidden;
    min-width: 1500px;
  }

  thead tr {
    background: #1a2332;
    color: #fff;
  }
  thead th {
    padding: 11px 10px;
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    letter-spacing: .4px;
    white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,.1);
  }
  thead th:nth-child(1) { text-align: left; padding-left: 14px; }
  thead th:nth-child(2) { text-align: left; min-width: 220px; }
  thead th:last-child { background: #f9c84a; color: #1a2332; border-right: none; }

  tbody tr {
    transition: background .1s;
    border-bottom: 1px solid #eef1f5;
  }
  tbody tr:hover { background: #fffbee; }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 9px 10px;
    font-size: 12.5px;
    text-align: center;
    color: #3a4a5a;
    border-right: 1px solid #eef1f5;
  }
  .brand-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .3px;
  }
  .brand-badge.nikon { background: #fde9e9; color: #c0392b; }
  .brand-badge.fujifilm { background: #e6f0ea; color: #1e7a4d; }

  tbody td:nth-child(2) {
    text-align: left;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: 600;
    color: #2c5282;
    padding-left: 14px;
    white-space: nowrap;
  }
  tbody td:nth-child(3) {
    text-align: left;
    color: #1a2332;
    font-weight: 500;
    max-width: 260px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    position: relative;
    cursor: default;
  }
  tbody td:last-child {
    font-weight: 700;
    color: #1a5276;
    background: #fef9e7;
    border-right: none;
  }

  td.zero { color: #ccd5de; }
  .hl { background: #fff3a3; border-radius: 2px; padding: 0 1px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #8899aa;
    font-size: 15px;
  }
  .empty-state .icon { font-size: 42px; margin-bottom: 12px; }
</style>
</head>

let currentBrand = 'all';

const headerRow = document.getElementById('headerRow');
HEADERS.forEach(h => {
  const th = document.createElement('th');
  th.textContent = h;
  headerRow.appendChild(th);
});

const tableBody = document.getElementById('tableBody');
const resultCount = document.getElementById('resultCount');
const emptyState = document.getElementById('emptyState');
const stockTable = document.getElementById('stockTable');
const searchInput = document.getElementById('searchInput');

function highlight(text, term) {
  if (!term) return escHtml(text);
  const re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return escHtml(text).replace(re, '<span class="hl">$1</span>');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setBrand(brand) {
  currentBrand = brand;
  document.querySelectorAll('.brand-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.brand === brand);
  });
  render(searchInput.value);
}

function render(term) {
  const q = term.trim().toLowerCase();
  tableBody.innerHTML = '';
  let count = 0;

  ROWS.forEach(row => {
    const brand = row[0];
    if (currentBrand !== 'all' && brand !== currentBrand) return;

    const itemNum = row[1].toLowerCase();
    const itemName = row[2].toLowerCase();
    if (q && !itemNum.includes(q) && !itemName.includes(q)) return;

    count++;
    const tr = document.createElement('tr');

    // Brand badge cell
    const tdBrand = document.createElement('td');
    tdBrand.innerHTML = `<span class="brand-badge ${brand.toLowerCase()}">${brand}</span>`;
    tr.appendChild(tdBrand);

    row.slice(1).forEach((cell, i) => {
      const td = document.createElement('td');
      if (i === 0 || i === 1) {
        td.innerHTML = highlight(cell, q);
        if (i === 1) td.title = cell;
      } else {
        td.textContent = cell === '' ? '-' : cell;
        if (cell === '0' || cell === '') td.classList.add('zero');
      }
      tr.appendChild(td);
    });
    tableBody.appendChild(tr);
  });

  const totalForBrand = currentBrand === 'all' ? ROWS.length : ROWS.filter(r => r[0] === currentBrand).length;

  if (q) {
    resultCount.innerHTML = `Showing <strong>${count}</strong> of ${totalForBrand} items`;
  } else {
    resultCount.innerHTML = `<strong>${totalForBrand}</strong> items total`;
  }

  const hasResults = count > 0;
  stockTable.style.display = hasResults ? '' : 'none';
  emptyState.style.display = hasResults ? 'none' : 'block';
  document.getElementById('emptyTerm').textContent = '"' + term + '"';
}

function clearSearch() {
  searchInput.value = '';
  searchInput.focus();
  render('');
}

searchInput.addEventListener('input', () => render(searchInput.value));

render('');
</script>
